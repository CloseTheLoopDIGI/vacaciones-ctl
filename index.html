<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Vacaciones 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent-m: #4ade80;
    --accent-t: #fb923c;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --feriado: #3b3b52;
    --v-bg-m: rgba(74,222,128,0.18);
    --v-bg-t: rgba(251,146,60,0.18);
    --error: #f87171;
    --weekend: #15151e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .app-header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    backdrop-filter: blur(12px);
  }
  .app-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    flex: 1;
  }
  .app-title span { color: var(--accent-m); }

  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px;
  }
  .dot-m { background: var(--accent-m); }
  .dot-t { background: var(--accent-t); }
  .dot-f { background: var(--feriado); border: 1px solid var(--border); }

  /* CONTROLS */
  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }
  select, .advisor-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, .advisor-select:focus {
    border-color: var(--accent-m);
  }
  .btn {
    padding: 7px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent-m); color: var(--accent-m); }
  .btn-save {
    background: var(--accent-m);
    color: #000;
    border-color: var(--accent-m);
  }
  .btn-save:hover { background: #22c55e; color: #000; border-color: #22c55e; }

  /* MONTH TABS */
  .month-tabs {
    padding: 0 32px;
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    color: var(--text-dim);
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .month-tab:hover { color: var(--text); }
  .month-tab.active {
    color: var(--accent-m);
    border-bottom-color: var(--accent-m);
  }

  /* NOTIFICATION */
  .notif {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 999;
    max-width: 360px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.25s;
    pointer-events: none;
    border: 1px solid;
  }
  .notif.show { opacity: 1; transform: translateY(0); }
  .notif.error { background: rgba(248,113,113,0.15); border-color: var(--error); color: var(--error); }
  .notif.success { background: rgba(74,222,128,0.15); border-color: var(--accent-m); color: var(--accent-m); }

  /* TABLE WRAPPER */
  .table-wrapper {
    overflow-x: auto;
    padding: 0 32px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) var(--bg);
  }
  .table-wrapper::-webkit-scrollbar { height: 6px; }
  .table-wrapper::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  table {
    border-collapse: collapse;
    min-width: 100%;
    margin-top: 20px;
  }

  /* FIXED COLUMNS */
  th, td {
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .col-name {
    position: sticky;
    left: 0;
    z-index: 10;
    background: var(--bg);
    padding: 8px 12px;
    font-size: 13px;
    min-width: 160px;
  }
  .col-turno {
    position: sticky;
    left: 160px;
    z-index: 10;
    background: var(--bg);
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    min-width: 70px;
    text-align: center;
  }
  .turno-m { color: var(--accent-m); }
  .turno-t { color: var(--accent-t); }

  /* HEADER ROWS */
  .header-name, .header-turno {
    background: var(--bg);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 10px;
  }
  .header-day-num {
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-align: center;
    padding: 4px 3px;
    min-width: 28px;
    color: var(--text);
  }
  .header-day-name {
    background: var(--surface2);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-align: center;
    padding: 3px 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .header-day-num.weekend, .header-day-name.weekend {
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* DATA CELLS */
  .cell {
    text-align: center;
    padding: 3px 2px;
    min-width: 28px;
    height: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .cell.weekend { background: var(--weekend); cursor: default; }
  .cell.feriado { background: var(--feriado); cursor: default; color: var(--text-dim); font-size: 10px; }
  .cell.vacation-m { background: var(--v-bg-m); color: var(--accent-m); }
  .cell.vacation-t { background: var(--v-bg-t); color: var(--accent-t); }
  .cell.editable:hover { background: var(--surface2); }
  .cell.editable.vacation-m:hover { filter: brightness(1.2); }
  .cell.editable.vacation-t:hover { filter: brightness(1.2); }
  .cell.locked { cursor: not-allowed; opacity: 0.7; }
  .cell.over-limit { background: rgba(248,113,113,0.2) !important; color: var(--error) !important; }

  /* COUNTER ROW */
  .counter-m, .counter-t {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-align: center;
    padding: 3px 2px;
    height: 22px;
  }
  .counter-m { color: var(--accent-m); background: rgba(74,222,128,0.05); }
  .counter-t { color: var(--accent-t); background: rgba(251,146,60,0.05); }
  .counter-m.full, .counter-t.full { color: var(--error); font-weight: 700; }

  /* SECTION LABELS */
  .section-label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    padding: 4px 8px;
  }

  /* ADVISOR MODE */
  body.advisor-mode .cell.editable.other-turno {
    cursor: not-allowed;
    opacity: 0.4;
  }

  /* STATS BAR */
  .stats-bar {
    padding: 12px 32px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }
  .stat-item strong { color: var(--text); }
  .stat-item.active { color: var(--accent-m); }
  .stat-item.active strong { color: var(--accent-m); }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Vacaciones <span>2026</span></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-m"></div><span>Mañana</span></div>

  </div>
</div>

<div class="controls">

</div>

<div class="month-tabs" id="monthTabs"></div>

<div class="stats-bar" id="statsBar"></div>

<div class="table-wrapper">
  <table id="mainTable"></table>
</div>

<div class="notif" id="notif"></div>

let currentAdvisor = '';
let turnoFilter = '';
let vacationState = {};  // employeeIdx -> Set of colIdxs

// Init vacation state from data
DATA.employees.forEach((emp, i) => {
  vacationState[i] = new Set(emp.vacations);
});

const MONTHS = [...new Set(DATA.dates.map(d => d.month))];

// Build month -> date indices map
const monthDates = {};
DATA.dates.forEach((d, i) => {
  if (!monthDates[d.month]) monthDates[d.month] = [];
  monthDates[d.month].push(i);
});

function getDateByColIdx(colIdx) {
  return DATA.dates[colIdx];
}

function countVacationsOnDay(colIdx, turno) {
  return DATA.employees.filter((emp, i) =>
    emp.turno === turno && vacationState[i] && vacationState[i].has(colIdx)
  ).length;
}

function isFeriado(empIdx, colIdx) {
  return DATA.employees[empIdx].feriados.includes(colIdx);
}

function isWeekend(colIdx) {
  const d = DATA.dates[colIdx];
  return d && (d.dayname === 'S' || d.dayname === 'D');
}

// Notifications
let notifTimer = null;
function showNotif(msg, type) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = 'notif ' + type + ' show';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

    if (count >= 2) {
      const d = DATA.dates[colIdx];
      showNotif(`⚠ Límite alcanzado: ya hay 2 asesores de turno ${emp.turno} el ${d.day} de ${d.month}`, 'error');
      return;
    }
    vacationState[empIdx].add(colIdx);
    renderTable();
    showNotif('✓ Vacación registrada', 'success');
  }
}

// Render month tabs
function renderMonthTabs() {
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = MONTHS.map(m =>
    `<div class="month-tab ${m === currentMonth ? 'active' : ''}" onclick="selectMonth('${m}')">${m}</div>`
  ).join('');
}

function selectMonth(month) {
  currentMonth = month;
  renderMonthTabs();
  renderTable();
  renderStats();
}

// Render advisor select
function renderAdvisorSelect() {
  const sel = document.getElementById('advisorSelect');
  DATA.employees.forEach(emp => {
    const opt = document.createElement('option');
    opt.value = emp.name;
    opt.textContent = `${emp.name} (${emp.turno})`;
    sel.appendChild(opt);
  });
}

// Render stats
function renderStats() {
  const bar = document.getElementById('statsBar');
  const monthIdx = monthDates[currentMonth] || [];
  
  let mTotal = 0, tTotal = 0;
  monthIdx.forEach(colIdx => {
    mTotal += countVacationsOnDay(colIdx, 'Mañana');
    tTotal += countVacationsOnDay(colIdx, 'Tarde');
  });

  let advisorInfo = '';
  if (currentAdvisor) {
    const empIdx = DATA.employees.findIndex(e => e.name === currentAdvisor);
    const emp = DATA.employees[empIdx];
    const myCount = monthIdx.filter(c => vacationState[empIdx].has(c)).length;
    advisorInfo = `<div class="stat-item active"><strong>${currentAdvisor}</strong> — ${myCount} días en ${currentMonth}</div>`;
  }

  bar.innerHTML = `
    ${advisorInfo}
    <div class="stat-item"><strong>${currentMonth}</strong></div>
    <div class="stat-item">🟢 Mañana: <strong>${mTotal}</strong> días-asesor</div>
    <div class="stat-item">🟠 Tarde: <strong>${tTotal}</strong> días-asesor</div>
  `;
}

// Render table
function renderTable() {
  const table = document.getElementById('mainTable');
  const dateIdxs = monthDates[currentMonth] || [];
  const employees = DATA.employees;
  const selectedEmpIdx = currentAdvisor ? DATA.employees.findIndex(e => e.name === currentAdvisor) : -1;
  
  let filteredEmps = employees.map((e, i) => ({...e, idx: i}));
  if (turnoFilter) filteredEmps = filteredEmps.filter(e => e.turno === turnoFilter);

  let html = '<thead>';
  
  // Row 1: day numbers
  html += '<tr>';
  html += '<th class="col-name header-name" rowspan="2">Asesor</th>';
  html += '<th class="col-turno header-turno" rowspan="2">Turno</th>';
  dateIdxs.forEach(colIdx => {
    const d = DATA.dates[colIdx];
    const wkClass = isWeekend(colIdx) ? ' weekend' : '';
    html += `<th class="header-day-num${wkClass}">${d.day}</th>`;
  });
  html += '</tr>';
  
  // Row 2: day names
  html += '<tr>';
  dateIdxs.forEach(colIdx => {
    const d = DATA.dates[colIdx];
    const wkClass = isWeekend(colIdx) ? ' weekend' : '';
    html += `<th class="header-day-name${wkClass}">${d.dayname}</th>`;
  });
  html += '</tr>';
  
  // Counter rows
  // Mañana counter
  if (!turnoFilter || turnoFilter === 'Mañana') {
    html += '<tr>';
    html += '<td class="col-name section-label" colspan="2">↑ Mañana / día</td>';
    dateIdxs.forEach(colIdx => {
      if (isWeekend(colIdx)) { html += '<td class="counter-m"></td>'; return; }
      const cnt = countVacationsOnDay(colIdx, 'Mañana');
      const fullClass = cnt >= 2 ? ' full' : '';
      html += `<td class="counter-m${fullClass}">${cnt > 0 ? cnt : ''}</td>`;
    });
    html += '</tr>';
  }
  
  // Tarde counter
  if (!turnoFilter || turnoFilter === 'Tarde') {
    html += '<tr>';
    html += '<td class="col-name section-label" colspan="2">↑ Tarde / día</td>';
    dateIdxs.forEach(colIdx => {
      if (isWeekend(colIdx)) { html += '<td class="counter-t"></td>'; return; }
      const cnt = countVacationsOnDay(colIdx, 'Tarde');
      const fullClass = cnt >= 2 ? ' full' : '';
      html += `<td class="counter-t${fullClass}">${cnt > 0 ? cnt : ''}</td>`;
    });
    html += '</tr>';
  }

  html += '</thead><tbody>';

  filteredEmps.forEach(emp => {
    const empIdx = emp.idx;
    const isCurrentAdvisor = empIdx === selectedEmpIdx;
    const isEditable = selectedEmpIdx === -1 || isCurrentAdvisor;
    const turnoClass = emp.turno === 'Mañana' ? 'turno-m' : 'turno-t';
    const rowHighlight = isCurrentAdvisor ? ' style="background:rgba(74,222,128,0.03)"' : '';

    html += `<tr${rowHighlight}>`;
    html += `<td class="col-name" style="font-weight:${isCurrentAdvisor ? '700' : '400'}">${emp.name}</td>`;
    html += `<td class="col-turno ${turnoClass}">${emp.turno}</td>`;

    dateIdxs.forEach(colIdx => {
      if (isWeekend(colIdx)) {
        html += `<td class="cell weekend"></td>`;
        return;
      }
      if (isFeriado(empIdx, colIdx)) {
        html += `<td class="cell feriado">F</td>`;
        return;
      }

      const hasV = vacationState[empIdx].has(colIdx);
      const vClass = hasV ? (emp.turno === 'Mañana' ? ' vacation-m' : ' vacation-t') : '';
      
      // Check over-limit
      const cnt = countVacationsOnDay(colIdx, emp.turno);
      const overLimit = hasV && cnt > 2;
      const overClass = overLimit ? ' over-limit' : '';

      let cellClass = 'cell';
      if (isEditable) cellClass += ' editable';
      else cellClass += ' locked';
      cellClass += vClass + overClass;

      const onclick = isEditable ? ` onclick="toggleVacation(${empIdx}, ${colIdx})"` : '';
      html += `<td class="${cellClass}"${onclick}>${hasV ? 'V' : ''}</td>`;
    });

    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
  renderStats();
}

// Export to CSV (since we can't generate xlsx client-side easily, we export readable CSV)
function exportData() {
  let csv = 'Asesor,Turno,Skill';
  DATA.dates.forEach(d => { csv += `,${d.month}-${d.day}`; });
  csv += '\n';
  
  DATA.employees.forEach((emp, i) => {
    csv += `"${emp.name}",${emp.turno},${emp.skill}`;
    DATA.dates.forEach((d, colIdx) => {
      if (vacationState[i].has(colIdx)) csv += ',V';
      else if (emp.feriados.includes(colIdx)) csv += ',F';
      else csv += ',';
    });
    csv += '\n';
  });
  
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vacaciones_2026.csv';
  a.click();
  URL.revokeObjectURL(url);
  showNotif('✓ Exportado como CSV', 'success');
}

// Init
renderMonthTabs();
renderAdvisorSelect();
renderTable();
renderStats();

// Event listeners
document.getElementById('advisorSelect').addEventListener('change', function() {
  currentAdvisor = this.value;
  const idx = DATA.employees.findIndex(e => e.name === currentAdvisor);
  const clearBtn = document.getElementById('clearMine');
  const saveBtn = document.getElementById('saveBtn');
  
  if (currentAdvisor) {
    clearBtn.style.display = '';
    saveBtn.style.display = '';
    const emp = DATA.employees[idx];
    document.getElementById('advisorInfo').textContent = `Turno ${emp.turno} · ${emp.skill}`;
  } else {
    clearBtn.style.display = 'none';
    saveBtn.style.display = 'none';
    document.getElementById('advisorInfo').textContent = '';
  }
  renderTable();
});

document.getElementById('turnoFilter').addEventListener('change', function() {
  turnoFilter = this.value;
  renderTable();
});

document.getElementById('clearMine').addEventListener('click', function() {
  const empIdx = DATA.employees.findIndex(e => e.name === currentAdvisor);
  if (empIdx < 0) return;
  // Only clear future vacations in current month
  const monthIdx = monthDates[currentMonth] || [];
  monthIdx.forEach(c => vacationState[empIdx].delete(c));
  renderTable();
  showNotif('Vacaciones del mes eliminadas', 'success');
});

document.getElementById('saveBtn').addEventListener('click', exportData);
</script>
