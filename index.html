<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
  --accent-m:#4ade80; --accent-t:#fb923c;
  --text:#e8e8f0; --text-dim:#6b6b80;
  --feriado:#2a2a3a; --v-bg-m:rgba(74,222,128,.15); --v-bg-t:rgba(251,146,60,.15);
  --error:#f87171; --weekend:#13131a; --warn:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}

/* ── LOGIN ── */
.login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;transition:opacity .35s;
}
.login-screen.hidden{opacity:0;pointer-events:none}
.login-card{
  width:400px;padding:48px;background:var(--surface);
  border-radius:8px;border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent-m),var(--accent-t));
}
.login-logo{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:var(--text-dim);margin-bottom:28px;
}
.login-title{font-size:34px;font-weight:900;line-height:1.1;margin-bottom:8px}
.login-sub{font-size:13px;color:var(--text-dim);margin-bottom:36px;line-height:1.5}
.btn-google{
  width:100%;padding:13px 20px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:6px;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .15s;
}
.btn-google:hover{border-color:var(--accent-m);color:var(--accent-m)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.login-error{
  margin-top:14px;padding:10px 14px;
  background:rgba(248,113,113,.1);border:1px solid var(--error);
  border-radius:5px;font-size:12px;color:var(--error);
  font-family:'DM Mono',monospace;display:none;
}
.login-error.show{display:block}

/* ── TOPBAR ── */
.topbar{
  padding:0 28px;height:54px;background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:200;
}
.brand{font-size:16px;font-weight:800;letter-spacing:-.5px}
.brand span{color:var(--accent-m)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#444;transition:background .3s;flex-shrink:0}
.sync-dot.on{background:var(--accent-m)}
.sync-dot.busy{background:var(--warn);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.role-badge{
  padding:3px 10px;border-radius:3px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;
}
.badge-supervisor{background:rgba(251,146,60,.15);color:var(--accent-t);border:1px solid rgba(251,146,60,.3)}
.badge-asesor{background:rgba(74,222,128,.12);color:var(--accent-m);border:1px solid rgba(74,222,128,.3)}
.user-name{font-size:13px;font-weight:500}
.btn-logout{
  margin-left:auto;padding:5px 14px;background:transparent;
  border:1px solid var(--border);color:var(--text-dim);border-radius:4px;
  font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;
}
.btn-logout:hover{border-color:var(--error);color:var(--error)}
.legend{display:flex;gap:14px;margin-right:8px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.dot-m{background:var(--accent-m)}.dot-t{background:var(--accent-t)}.dot-f{background:#3a3a50;border:1px solid var(--border)}

/* ── CONTROLS ── */
.controls-bar{
  padding:10px 28px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.ctrl-label{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.ctrl-select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:5px;font-family:'Syne',sans-serif;font-size:12px;
  cursor:pointer;outline:none;transition:border-color .2s;min-width:140px;
}
.ctrl-select:focus{border-color:var(--accent-m)}
.ctrl-divider{width:1px;height:22px;background:var(--border)}
.btn-export{
  padding:6px 16px;background:var(--accent-m);border:none;color:#000;
  border-radius:5px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .15s;margin-left:auto;
}
.btn-export:hover{background:#22c55e}

/* ── MONTHS ── */
.month-row{
  padding:0 28px;background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
}
.month-row::-webkit-scrollbar{display:none}
.month-tab{
  padding:10px 14px;font-size:11px;font-family:'DM Mono',monospace;
  text-transform:uppercase;letter-spacing:.5px;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;color:var(--text-dim);transition:all .15s;
}
.month-tab:hover{color:var(--text)}
.month-tab.active{color:var(--accent-m);border-bottom-color:var(--accent-m)}

/* ── STATS ── */
.stats-bar{
  padding:8px 28px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;gap:20px;align-items:center;flex-wrap:wrap;
}
.stat{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim)}
.stat strong{color:var(--text)}
.stat.me{color:var(--accent-m)}.stat.me strong{color:var(--accent-m)}

/* ── TABLE ── */
.table-wrap{
  overflow-x:auto;padding:20px 28px 48px;
  scrollbar-width:thin;scrollbar-color:var(--border) var(--bg);
}
.table-wrap::-webkit-scrollbar{height:5px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
table{border-collapse:collapse}

.th-name,.th-turno{
  position:sticky;z-index:20;background:var(--bg);border:1px solid var(--border);
  padding:6px 10px;font-size:10px;font-family:'DM Mono',monospace;
  text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);white-space:nowrap;
}
.th-name{left:0;min-width:168px}.th-turno{left:168px;min-width:68px;text-align:center}
.th-day-num{
  background:var(--surface);border:1px solid var(--border);
  text-align:center;padding:4px 2px;min-width:28px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--text);
}
.th-day-name{
  background:var(--surface2);border:1px solid var(--border);
  text-align:center;padding:3px 2px;font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-dim);text-transform:uppercase;
}
.th-day-num.wknd,.th-day-name.wknd{opacity:.3}
.td-cnt-label{
  position:sticky;left:0;z-index:10;background:var(--bg);border:1px solid var(--border);
  font-size:9px;font-family:'DM Mono',monospace;color:var(--text-dim);padding:3px 8px;white-space:nowrap;
}
.td-cnt{border:1px solid var(--border);text-align:center;font-family:'DM Mono',monospace;font-size:10px;height:20px;padding:2px}
.td-cnt.m{color:var(--accent-m);background:rgba(74,222,128,.04)}
.td-cnt.t{color:var(--accent-t);background:rgba(251,146,60,.04)}
.td-cnt.full{background:rgba(248,113,113,.15)!important;color:var(--error)!important;font-weight:700}
.td-name{
  position:sticky;left:0;z-index:10;background:var(--bg);border:1px solid var(--border);
  padding:5px 10px;font-size:12px;font-weight:500;white-space:nowrap;min-width:168px;
}
.td-name.is-me{background:rgba(74,222,128,.05);font-weight:700}
.td-turno{
  position:sticky;left:168px;z-index:10;background:var(--bg);border:1px solid var(--border);
  text-align:center;padding:5px 6px;font-size:10px;font-family:'DM Mono',monospace;white-space:nowrap;
}
.td-turno.is-me{background:rgba(74,222,128,.05)}
.turno-m{color:var(--accent-m)}.turno-t{color:var(--accent-t)}
.cell{
  border:1px solid var(--border);text-align:center;min-width:28px;height:28px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  transition:background .1s;user-select:none;cursor:default;
}
.cell.wknd{background:var(--weekend)}
.cell.feriado{background:var(--feriado);color:var(--text-dim);font-size:9px}
.cell.v-m{background:var(--v-bg-m);color:var(--accent-m);font-weight:700}
.cell.v-t{background:var(--v-bg-t);color:var(--accent-t);font-weight:700}
.cell.overload{background:rgba(248,113,113,.2)!important;color:var(--error)!important}
.cell.editable{cursor:pointer}
.cell.editable:hover{filter:brightness(1.4)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  padding:11px 20px;border-radius:6px;font-size:13px;font-weight:600;
  opacity:0;transition:all .2s;pointer-events:none;z-index:9999;
  white-space:nowrap;border:1px solid;font-family:'DM Mono',monospace;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(74,222,128,.15);border-color:var(--accent-m);color:var(--accent-m)}
.toast.err{background:rgba(248,113,113,.15);border-color:var(--error);color:var(--error)}

/* ── LOADING ── */
.loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:5000;transition:opacity .35s;
}
.loading.hidden{opacity:0;pointer-events:none}
.loading-text{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--text-dim);animation:pulse 1.2s infinite;
}
</style>
</head>

const MONTHS = [...new Set(STATIC.dates.map(d => d.month))];
const monthDates = {};
STATIC.dates.forEach((d,i) => {
  if (!monthDates[d.month]) monthDates[d.month] = [];
  monthDates[d.month].push(i);
});

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let curMonth   = 'Enero';
let curUser    = null;   // { email, name, isSupervisor, empIdx }
let editingIdx = null;   // empIdx being edited (supervisor override)
let vacState   = {};
let toastTimer = null;

STATIC.employees.forEach((e,i) => { vacState[i] = new Set(e.vacations); });

// ═══════════════════════════════════════
// FIREBASE AUTH
// ═══════════════════════════════════════
document.addEventListener('fb-ready', () => {
  window._onAuth(async (user) => {
    if (!user) {
      showLogin();
      hideLoading();
      return;
    }

    const email = user.email?.toLowerCase();

    // Check domain
    if (!email?.endsWith('@digimobil.es')) {
      showLoginError('Solo se permite acceso con cuentas @digimobil.es');
      await window._signOut();
      hideLoading();
      return;
    }

    const isSupervisor = SUPERVISOR_EMAILS.includes(email);
    const empIdx = ADVISOR_EMAILS[email] ?? null;

    if (!isSupervisor && empIdx === null) {
      showLoginError('Tu correo no está registrado en el calendario. Contacta con tu supervisor.');
      await window._signOut();
      hideLoading();
      return;
    }

    curUser = {
      email,
      name: user.displayName || email.split('@')[0],
      isSupervisor,
      empIdx
    };

    // Default editing target
    editingIdx = isSupervisor ? null : empIdx;

    // Listen Firebase DB
    window._onValue(window._ref(window._db, 'vacaciones'), snap => {
      const data = snap.val();
      if (data) {
        STATIC.employees.forEach((_,i) => {
          if (data[i] != null) vacState[i] = new Set(Object.values(data[i]));
        });
      }
      renderTable();
      renderStats();
      setSyncDot('on');
    });

    initApp();
    hideLoading();
  });
});

setTimeout(() => hideLoading(), 5000);

// ═══════════════════════════════════════
// AUTH ACTIONS
// ═══════════════════════════════════════
async function doLogin() {
  const errEl = document.getElementById('loginError');
  errEl.classList.remove('show');
  try {
    await window._signIn();
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showLoginError('Error al iniciar sesión. Inténtalo de nuevo.');
    }
  }
}

async function doLogout() {
  await window._signOut();
  curUser = null;
  editingIdx = null;
  document.getElementById('app').style.display = 'none';
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
}
function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ═══════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════
function initApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';

  // Topbar
  document.getElementById('topName').textContent = curUser.name;
  const roleEl = document.getElementById('topRole');
  if (curUser.isSupervisor) {
    roleEl.textContent = 'Supervisor';
    roleEl.className = 'role-badge badge-supervisor';
  } else {
    roleEl.textContent = 'Asesor';
    roleEl.className = 'role-badge badge-asesor';
  }

  // Supervisor controls
  if (curUser.isSupervisor) {
    const sc = document.getElementById('supervisorControls');
    sc.style.display = 'flex';
    const sel = document.getElementById('advisorSelect');
    STATIC.employees.forEach((e,i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${e.name} (${e.turno})`;
      sel.appendChild(opt);
    });
  }

  setSyncDot('on');
  buildMonthTabs();
  renderTable();
  renderStats();
}

// ═══════════════════════════════════════
// SUPERVISOR: change editing target
// ═══════════════════════════════════════
function onAdvisorChange() {
  const val = document.getElementById('advisorSelect').value;
  editingIdx = val === '' ? null : parseInt(val);
  renderTable();
  renderStats();
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const isWknd    = c => { const d=STATIC.dates[c]; return d&&(d.dayname==='S'||d.dayname==='D'); };
const isFeriado = (ei,c) => STATIC.employees[ei].feriados.includes(c);
const countVac  = (c,t) => STATIC.employees.filter((e,i)=>e.turno===t&&vacState[i]?.has(c)).length;

function canEdit(empIdx) {
  if (!curUser) return false;
  if (curUser.isSupervisor) return editingIdx === empIdx;
  return curUser.empIdx === empIdx;
}

// ═══════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════
function toggleVac(empIdx, colIdx) {
  if (!canEdit(empIdx)) return;
  if (isWknd(colIdx) || isFeriado(empIdx, colIdx)) return;

  const emp = STATIC.employees[empIdx];
  if (vacState[empIdx].has(colIdx)) {
    vacState[empIdx].delete(colIdx);
    saveFirebase(empIdx);
    renderTable(); renderStats();
    toast('Vacación eliminada', 'ok');
  } else {
    if (countVac(colIdx, emp.turno) >= 2) {
      const d = STATIC.dates[colIdx];
      toast(`Límite: ya hay 2 de turno ${emp.turno} el ${d.day} de ${d.month}`, 'err');
      return;
    }
    vacState[empIdx].add(colIdx);
    saveFirebase(empIdx);
    renderTable(); renderStats();
    toast('✓ Vacación guardada', 'ok');
  }
}

async function saveFirebase(empIdx) {
  setSyncDot('busy');
  const arr = Array.from(vacState[empIdx]);
  const obj = arr.length ? Object.fromEntries(arr.map((v,i)=>[i,v])) : null;
  await window._set(window._ref(window._db, `vacaciones/${empIdx}`), obj);
  setSyncDot('on');
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function buildMonthTabs() {
  document.getElementById('monthRow').innerHTML = MONTHS.map(m =>
    `<div class="month-tab${m===curMonth?' active':''}" onclick="selectMonth('${m}')">${m}</div>`
  ).join('');
}

function selectMonth(m) {
  curMonth = m; buildMonthTabs(); renderTable(); renderStats();
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const idxs = monthDates[curMonth] || [];
  let mT=0, tT=0;
  idxs.forEach(c => { mT+=countVac(c,'Mañana'); tT+=countVac(c,'Tarde'); });

  let myPart = '';
  const myIdx = curUser?.isSupervisor ? editingIdx : curUser?.empIdx;
  if (myIdx !== null && myIdx !== undefined) {
    const cnt = idxs.filter(c => vacState[myIdx]?.has(c)).length;
    const name = curUser.isSupervisor ? STATIC.employees[myIdx].name : curUser.name;
    myPart = `<div class="stat me"><strong>${name}</strong> — ${cnt} día${cnt!==1?'s':''} en ${curMonth}</div>`;
  }

  bar.innerHTML = `${myPart}<div class="stat">Mañana: <strong>${mT}</strong></div><div class="stat">Tarde: <strong>${tT}</strong></div><div class="stat" style="margin-left:auto;color:var(--accent-m)">● Sincronizado</div>`;
}

function renderTable() {
  const table = document.getElementById('mainTable');
  const dateIdxs = monthDates[curMonth] || [];
  const tf = document.getElementById('turnoFilter').value;
  let emps = STATIC.employees.map((e,i)=>Object.assign({},e,{idx:i}));
  if (tf) emps = emps.filter(e=>e.turno===tf);

  let h = '<thead><tr>';
  h += '<th class="th-name" rowspan="2">Asesor</th>';
  h += '<th class="th-turno" rowspan="2">Turno</th>';
  dateIdxs.forEach(c => {
    const d=STATIC.dates[c];
    h+=`<th class="th-day-num${isWknd(c)?' wknd':''}">${d.day}</th>`;
  });
  h += '</tr><tr>';
  dateIdxs.forEach(c => {
    const d=STATIC.dates[c];
    h+=`<th class="th-day-name${isWknd(c)?' wknd':''}">${d.dayname}</th>`;
  });
  h += '</tr>';

  if (!tf||tf==='Mañana') {
    h+='<tr><td class="td-cnt-label" colspan="2">↑ Mañana / día</td>';
    dateIdxs.forEach(c=>{
      if(isWknd(c)){h+='<td class="td-cnt m"></td>';return;}
      const n=countVac(c,'Mañana');
      h+=`<td class="td-cnt m${n>=2?' full':''}">${n||''}</td>`;
    });
    h+='</tr>';
  }
  if (!tf||tf==='Tarde') {
    h+='<tr><td class="td-cnt-label" colspan="2">↑ Tarde / día</td>';
    dateIdxs.forEach(c=>{
      if(isWknd(c)){h+='<td class="td-cnt t"></td>';return;}
      const n=countVac(c,'Tarde');
      h+=`<td class="td-cnt t${n>=2?' full':''}">${n||''}</td>`;
    });
    h+='</tr>';
  }
  h+='</thead><tbody>';

  emps.forEach(emp=>{
    const isMe = emp.idx === (curUser?.isSupervisor ? editingIdx : curUser?.empIdx);
    const editable = canEdit(emp.idx);
    h+=`<tr>`;
    h+=`<td class="td-name${isMe?' is-me':''}">${isMe?'→ ':''}${emp.name}</td>`;
    h+=`<td class="td-turno${isMe?' is-me':''} ${emp.turno==='Mañana'?'turno-m':'turno-t'}">${emp.turno}</td>`;
    dateIdxs.forEach(c=>{
      if(isWknd(c)){h+='<td class="cell wknd"></td>';return;}
      if(isFeriado(emp.idx,c)){h+='<td class="cell feriado">F</td>';return;}
      const hasV=vacState[emp.idx]?.has(c);
      const cnt=countVac(c,emp.turno);
      let cls='cell';
      if(hasV) cls+=emp.turno==='Mañana'?' v-m':' v-t';
      if(hasV&&cnt>2) cls+=' overload';
      if(editable) cls+=' editable';
      const click=editable?` onclick="toggleVac(${emp.idx},${c})"` :'';
      h+=`<td class="${cls}"${click}>${hasV?'V':''}</td>`;
    });
    h+='</tr>';
  });

  h+='</tbody>';
  table.innerHTML=h;
}

// ═══════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════
function exportCSV() {
  let rows=[['Asesor','Turno','Skill'].concat(STATIC.dates.map(d=>`${d.month} ${d.day} (${d.dayname})`))];
  STATIC.employees.forEach((emp,i)=>{
    let row=[emp.name,emp.turno,emp.skill];
    STATIC.dates.forEach((_,c)=>{
      if(isWknd(c)) row.push('');
      else if(isFeriado(i,c)) row.push('F');
      else if(vacState[i]?.has(c)) row.push('V');
      else row.push('');
    });
    rows.push(row);
  });
  rows.push([]);
  rows.push(['CONTADOR MAÑANA','',''].concat(STATIC.dates.map((_,c)=>isWknd(c)?'':countVac(c,'Mañana')||'')));
  rows.push(['CONTADOR TARDE','',''].concat(STATIC.dates.map((_,c)=>isWknd(c)?'':countVac(c,'Tarde')||'')));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Vacaciones_2026_CTL.csv';
  a.click();
  toast('✓ Exportado — ábrelo con Excel','ok');
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function setSyncDot(s) {
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(s==='on'?' on':s==='busy'?' busy':'');
}
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
function toast(msg,type='ok') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
